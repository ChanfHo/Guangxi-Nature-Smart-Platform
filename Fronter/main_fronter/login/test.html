<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />
  <title>登录</title>
</head>

<body>
  <div class="container">
    <form action="#" class="login-form" id="loginForm">
      <h2>登 录</h2>
      <input type="text" name="username" placeholder="用户名" />
      <input type="password" name="password" placeholder="密码" />
      <button type="submit">登录</button>
      <!-- 调试信息显示区域 -->
      <div id="debug-info" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; display: none;">
        <h3>调试信息</h3>
        <pre id="debug-output" style="white-space: pre-wrap; word-break: break-all;"></pre>
      </div>
      <p class="register-text">
        还没有账号？<a href="../register/index.html" class="register-link">去注册</a>
      </p>
    </form>
  </div>

  <script>
    // 启用调试模式
    const DEBUG = true;
    const debugInfo = document.getElementById('debug-info');
    const debugOutput = document.getElementById('debug-output');
    
    if (DEBUG) {
      debugInfo.style.display = 'block';
    }
    
    // 调试日志函数
    function logDebug(message, data) {
      if (!DEBUG) return;
      
      const timestamp = new Date().toISOString();
      let logMessage = `[${timestamp}] ${message}\n`;
      
      if (data !== undefined) {
        if (typeof data === 'object') {
          logMessage += JSON.stringify(data, null, 2) + '\n';
        } else {
          logMessage += data + '\n';
        }
      }
      
      debugOutput.textContent += logMessage;
      console.log(message, data);
    }
    
    // 检查localStorage中现有的token
    const existingToken = localStorage.getItem('userInfo');
    logDebug('登录前检查localStorage中的userInfo:', existingToken);
    
    // 登录表单提交
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      logDebug('开始登录流程');

      const username = event.target.username.value;
      const password = event.target.password.value;
      
      logDebug('登录信息', { username, password: '******' });
      
      // 确保使用正确的API URL
      // const backURL = 'http://localhost:8000/api/user/account/login';
      const backURL = 'http://140.143.194.176:8000/api/user/account/login';
      
      logDebug('请求URL:', backURL);
      logDebug('请求方法:', 'POST');
      logDebug('请求头:', {'Content-Type': 'application/json'});
      logDebug('请求体:', {username, password: '******'});

      fetch(backURL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      })
      .then(response => {
        logDebug('收到响应:', {
          status: response.status,
          statusText: response.statusText,
          headers: Object.fromEntries([...response.headers])
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        logDebug('登录返回数据:', data);

        if (data.code === 200) {
          // 详细记录token信息
          logDebug('成功响应结构:', {
            code: data.code,
            message: data.message,
            dataStructure: data.data ? Object.keys(data.data) : 'No data field'
          });
          
          // 正确存储token信息
          const userInfo = {
            username: username,
            token: data.data && data.data.token // 从正确的位置获取token
          };
          
          logDebug('保存到localStorage的数据:', userInfo);
          localStorage.setItem('userInfo', JSON.stringify(userInfo));
          
          // 再次检查localStorage以确保数据正确保存
          const savedInfo = localStorage.getItem('userInfo');
          logDebug('保存后localStorage中的userInfo:', savedInfo);
          
          // 解析保存的内容并检查token
          try {
            const parsedInfo = JSON.parse(savedInfo);
            logDebug('解析后的userInfo:', parsedInfo);
            logDebug('token是否存在:', !!parsedInfo.token);
            
            // 测试请求AI接口
            testAIAccess(parsedInfo.token);
          } catch (e) {
            logDebug('解析saved userInfo失败:', e.message);
          }
          
          // 跳转到主页
          setTimeout(() => {
            logDebug('即将跳转到主页...');
            window.location.href = '../index.html';
          }, 3000); // 延迟3秒，以便查看调试信息
        } else {
          alert(data.message || '登录失败，请检查用户名或密码！');
          logDebug('登录失败:', data.message);
        }
      })
      .catch(error => {
        logDebug('登录错误:', error.message);
        alert('登录失败: ' + error.message);
      });
    });
    
    // 测试AI接口访问
    function testAIAccess(token) {
      logDebug('测试AI接口访问, token:', token ? token.substring(0, 10) + '...' : 'null');
      
      // 使用与chat.js中相同的URL
      const aiURL = 'http://localhost:8000/api/deepseek';
      const headers = { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
      
      logDebug('AI请求URL:', aiURL);
      logDebug('AI请求头:', headers);
      
      fetch(aiURL, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ message: 'test message' })
      })
      .then(response => {
        logDebug('AI接口测试响应:', {
          status: response.status,
          statusText: response.statusText
        });
        
        return response.text(); // 使用text()而不是json()以避免解析错误
      })
      .then(text => {
        try {
          const data = JSON.parse(text);
          logDebug('AI接口测试成功:', data);
        } catch (e) {
          logDebug('AI接口响应不是JSON格式:', text);
        }
      })
      .catch(error => {
        logDebug('AI接口测试失败:', error.message);
      });
    }
  </script>
</body>
</html>
